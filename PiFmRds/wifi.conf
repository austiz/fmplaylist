# FM Playlist Pi — WiFi Config
#
# HOW TO EDIT:
#   1. Plug the Pi SD card into your Windows PC
#   2. Open the small FAT partition (usually shows as "bootfs" or "boot")
#   3. Copy this file into the ROOT of that partition as "wifi.conf"
#   4. Edit SSID and PASSWORD below, save, eject the SD card
#   5. On the Pi, run:  sudo bash ~/PiFmRds/src/wifi_setup.sh
#      (or it runs automatically on boot if the systemd service is installed)
#
# FINDING YOUR IPHONE HOTSPOT SSID:
#   Settings → General → About → Name  (e.g. "Austin's iPhone")
#   The SSID is exactly that name — apostrophes and spaces are fine, just quote it below.
#
# FINDING YOUR HOTSPOT PASSWORD:
#   Settings → Personal Hotspot → "Wi-Fi Password"

SSID="iPhone"
PASSWORD="your_hotspot_password_here"

# Two-letter country code — change if not in the US
COUNTRY="US"
