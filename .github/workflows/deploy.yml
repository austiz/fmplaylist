name: Deploy to Namecheap

on:
  push:
    branches: [main]

# Only one deploy runs at a time; a new push cancels the in-flight one
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - run: cp .env.example .env
      - run: php artisan key:generate
      - run: npm run build
      - run: php artisan test

  # ── 2. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      # Guard: never deploy with a missing or root-level DEPLOY_PATH
      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_PATH }}" ] || [ "${{ secrets.DEPLOY_PATH }}" = "/" ]; then
            echo "DEPLOY_PATH is missing or invalid." >&2; exit 1
          fi

      # Wayfinder calls php artisan during npm run build — needs PHP + vendor on the runner
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --quiet

      - run: cp .env.example .env && php artisan key:generate

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # Step 1: pull code, write .env, install deps, enter maintenance mode
      - name: Pull code and prepare environment
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 21098
          script: |
            set -e
            PHP="$(command -v /usr/local/bin/php php 2>/dev/null | head -1)"
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull origin main --ff-only

            # Write production .env (always — keeps it in sync with the secret)
            cat > .env << 'ENVEOF'
            ${{ secrets.PRODUCTION_ENV }}
            ENVEOF
            chmod 600 .env

            # Ensure writable dirs exist
            mkdir -p storage/framework/cache storage/framework/sessions \
                     storage/framework/views storage/logs bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            /usr/local/bin/composer install \
              --no-dev \
              --optimize-autoloader \
              --no-interaction \
              --quiet

            $PHP artisan down || true

      # Step 2: upload the built assets that git doesn't track
      - name: Upload built frontend assets
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 21098
          source: "public/build/"
          target: ${{ secrets.DEPLOY_PATH }}/public/
          strip_components: 1

      # Step 3: migrate, cache, link storage, bring site back up
      - name: Migrate, cache, and bring up
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 21098
          script: |
            set -e
            PHP="$(command -v /usr/local/bin/php php 2>/dev/null | head -1)"
            cd "${{ secrets.DEPLOY_PATH }}"
            $PHP artisan migrate --force
            $PHP artisan optimize:clear
            $PHP artisan config:cache
            $PHP artisan route:cache
            $PHP artisan view:cache
            $PHP artisan event:cache
            $PHP artisan storage:link || true
            $PHP artisan optimize
            $PHP artisan up
            echo "Deploy complete: $(date)"
