name: Deploy to Namecheap

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - run: cp .env.example .env && php artisan key:generate
      - run: npm run build
      - run: php artisan test

  # ── 2. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_PATH }}" ] || [ "${{ secrets.DEPLOY_PATH }}" = "/" ]; then
            echo "DEPLOY_PATH is missing or invalid." >&2; exit 1
          fi

      # PHP + composer needed so Wayfinder can run during npm run build
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --quiet

      - run: cp .env.example .env && php artisan key:generate

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build frontend assets
        run: npm run build

      # Write production .env in the runner (individual secrets — no heredoc YAML issues)
      - name: Write production .env
        run: |
          {
            echo 'APP_NAME="FM Playlist"'
            echo 'APP_ENV=production'
            echo 'APP_DEBUG=false'
            echo 'APP_URL=${{ secrets.APP_URL }}'
            echo 'APP_KEY=${{ secrets.APP_KEY }}'
            echo 'DB_CONNECTION=mysql'
            echo 'DB_HOST=localhost'
            echo 'DB_PORT=3306'
            echo 'DB_DATABASE=${{ secrets.DB_DATABASE }}'
            echo 'DB_USERNAME=${{ secrets.DB_USERNAME }}'
            echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}'
            echo 'SESSION_DRIVER=database'
            echo 'SESSION_LIFETIME=120'
            echo 'SESSION_SECURE_COOKIE=true'
            echo 'SESSION_SAME_SITE=lax'
            echo 'QUEUE_CONNECTION=sync'
            echo 'CACHE_STORE=database'
            echo 'FILESYSTEM_DISK=public'
            echo 'LOG_CHANNEL=stack'
            echo 'LOG_LEVEL=error'
            echo 'BROADCAST_CONNECTION=log'
            echo 'MAIL_MAILER=log'
            echo 'VITE_APP_NAME="FM Playlist"'
          } > .env.production

      # Step 1: pull latest code, create dirs, enter maintenance mode
      - name: Pull code and prepare
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull origin main --ff-only
            mkdir -p storage/framework/cache storage/framework/sessions \
                     storage/framework/views storage/logs bootstrap/cache
            chmod -R 775 storage bootstrap/cache
            php artisan down || true

      # Step 2: upload built frontend assets
      - name: Upload frontend assets
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "public/build/"
          target: ${{ secrets.DEPLOY_PATH }}/public/
          strip_components: 1

      # Step 3: upload production .env
      - name: Upload .env
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: ".env.production"
          target: ${{ secrets.DEPLOY_PATH }}/

      # Step 4: install deps, migrate, cache, bring up
      - name: Run Laravel artisan commands
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            mv .env.production .env
            chmod 600 .env
            /usr/local/bin/composer install \
              --no-dev --optimize-autoloader --no-interaction --quiet
            if command -v php >/dev/null 2>&1; then PHP_BIN="php"; else PHP_BIN="/usr/local/bin/php"; fi
            echo "PHP: $($PHP_BIN -v | head -n1)"
            $PHP_BIN artisan migrate --force
            $PHP_BIN artisan optimize:clear
            $PHP_BIN artisan config:cache
            $PHP_BIN artisan route:cache
            $PHP_BIN artisan view:cache
            $PHP_BIN artisan event:cache
            $PHP_BIN artisan storage:link || true
            $PHP_BIN artisan optimize
            $PHP_BIN artisan up
            echo "Deploy complete: $(date)"

      # Step 5: keep public_html in sync (document root locked on shared hosting)
      - name: Sync public_html
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            DOCROOT="$HOME/public_html"
            APP="$HOME/fmplaylist"
            echo '<?php require "/home/fmplyomq/fmplaylist/public/index.php";' > "$DOCROOT/index.php"
            cp "$APP/public/.htaccess" "$DOCROOT/.htaccess"
            if [ ! -L "$DOCROOT/build" ]; then
              rm -rf "$DOCROOT/build"
              ln -s "$APP/public/build" "$DOCROOT/build"
            fi
            if [ ! -L "$DOCROOT/storage" ]; then
              rm -rf "$DOCROOT/storage"
              ln -s "$APP/storage/app/public" "$DOCROOT/storage"
            fi
            echo "public_html synced."
