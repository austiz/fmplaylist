name: Deploy to Namecheap

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - run: cp .env.example .env && php artisan key:generate
      - run: npm run build
      - run: php artisan test

  # ── 2. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_PATH }}" ] || [ "${{ secrets.DEPLOY_PATH }}" = "/" ]; then
            echo "DEPLOY_PATH is missing or invalid (cannot be /)." >&2; exit 1
          fi

      # PHP + composer needed so Wayfinder can run during npm run build
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --quiet

      - run: cp .env.example .env && php artisan key:generate

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build frontend assets
        run: npm run build

      # Write production .env in the runner (individual secrets — no heredoc YAML issues)
      - name: Write production .env
        run: |
          {
            echo 'APP_NAME="FM Playlist"'
            echo 'APP_ENV=production'
            echo 'APP_DEBUG=false'
            echo 'APP_URL=${{ secrets.APP_URL }}'
            echo 'APP_KEY=${{ secrets.APP_KEY }}'
            echo 'DB_CONNECTION=mysql'
            echo 'DB_HOST=localhost'
            echo 'DB_PORT=3306'
            echo 'DB_DATABASE=${{ secrets.DB_DATABASE }}'
            echo 'DB_USERNAME=${{ secrets.DB_USERNAME }}'
            echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}'
            echo 'SESSION_DRIVER=database'
            echo 'SESSION_LIFETIME=120'
            echo 'SESSION_SECURE_COOKIE=true'
            echo 'SESSION_SAME_SITE=lax'
            echo 'QUEUE_CONNECTION=sync'
            echo 'CACHE_STORE=database'
            echo 'FILESYSTEM_DISK=public'
            echo 'LOG_CHANNEL=stack'
            echo 'LOG_LEVEL=error'
            echo 'BROADCAST_CONNECTION=log'
            echo 'MAIL_MAILER=log'
            echo 'VITE_APP_NAME="FM Playlist"'
          } > .env.production

      # Verify SSH connection before doing any real work
      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: echo "SSH connection OK on $(hostname)"

      # Ensure remote app directory exists
      - name: Ensure remote directories exist
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            mkdir -p "${{ secrets.DEPLOY_PATH }}/storage/framework/cache"
            mkdir -p "${{ secrets.DEPLOY_PATH }}/storage/framework/sessions"
            mkdir -p "${{ secrets.DEPLOY_PATH }}/storage/framework/views"
            mkdir -p "${{ secrets.DEPLOY_PATH }}/storage/logs"
            mkdir -p "${{ secrets.DEPLOY_PATH }}/bootstrap/cache"
            echo "Directories ready."

      # Deploy app via rsync — excludes .env, storage, and node_modules
      - name: Deploy app files
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: >-
            -azr --delete
            --exclude='.git'
            --exclude='.github'
            --exclude='node_modules'
            --exclude='.env'
            --exclude='.env.production'
            --exclude='storage/'
          path: ./
          remote_path: ${{ secrets.DEPLOY_PATH }}/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}
          remote_port: ${{ secrets.DEPLOY_PORT }}

      # Upload production .env (written in runner — no YAML/heredoc quoting issues)
      - name: Upload .env to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: ".env.production"
          target: ${{ secrets.DEPLOY_PATH }}/

      # Harden permissions
      - name: Harden permissions
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            chmod -R 775 "$APP_DIR/storage" "$APP_DIR/bootstrap/cache"
            mv "$APP_DIR/.env.production" "$APP_DIR/.env"
            chmod 600 "$APP_DIR/.env"

      # Run Laravel artisan commands
      - name: Run Laravel artisan commands
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd "${{ secrets.DEPLOY_PATH }}"
            if command -v php >/dev/null 2>&1; then PHP_BIN="php"; else PHP_BIN="/usr/local/bin/php"; fi
            echo "PHP: $($PHP_BIN -v | head -n1)"
            $PHP_BIN artisan down || true
            /usr/local/bin/composer install \
              --no-dev --optimize-autoloader --no-interaction --quiet
            $PHP_BIN artisan migrate --force
            $PHP_BIN artisan optimize:clear
            $PHP_BIN artisan config:cache
            $PHP_BIN artisan route:cache
            $PHP_BIN artisan view:cache
            $PHP_BIN artisan event:cache
            $PHP_BIN artisan storage:link || true
            $PHP_BIN artisan optimize
            $PHP_BIN artisan up
            echo "Deploy complete: $(date)"

      # Keep public_html in sync (document root is locked to public_html on shared hosting)
      - name: Sync public_html
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            DOCROOT="$HOME/public_html"
            APP="$HOME/fmplaylist"
            # Proxy index.php — routes all PHP requests into the Laravel app
            echo '<?php require "/home/fmplyomq/fmplaylist/public/index.php";' > "$DOCROOT/index.php"
            # Keep .htaccess up to date (HTTPS redirect, security headers)
            cp "$APP/public/.htaccess" "$DOCROOT/.htaccess"
            # Symlink build assets so Vite hashed files are served from public_html
            if [ ! -L "$DOCROOT/build" ]; then
              rm -rf "$DOCROOT/build"
              ln -s "$APP/public/build" "$DOCROOT/build"
            fi
            # Symlink storage for user-uploaded files
            if [ ! -L "$DOCROOT/storage" ]; then
              rm -rf "$DOCROOT/storage"
              ln -s "$APP/storage/app/public" "$DOCROOT/storage"
            fi
            echo "public_html synced."
