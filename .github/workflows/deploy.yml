name: Deploy to Namecheap

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - run: cp .env.example .env && php artisan key:generate
      - run: npm run build
      - run: php artisan test

  # ── 2. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_PATH }}" ] || [ "${{ secrets.DEPLOY_PATH }}" = "/" ]; then
            echo "DEPLOY_PATH is missing or invalid." >&2; exit 1
          fi

      # PHP + composer needed so Wayfinder can run during npm run build
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --quiet

      - run: cp .env.example .env && php artisan key:generate

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build frontend assets
        run: npm run build

      # Step 1: pull latest code, create dirs, enter maintenance mode
      - name: Pull code and prepare
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull origin main --ff-only
            mkdir -p storage/framework/cache storage/framework/sessions \
                     storage/framework/views storage/logs bootstrap/cache
            chmod -R 775 storage bootstrap/cache
            if command -v php >/dev/null 2>&1; then PHP_BIN="php"
            elif [ -f "/opt/alt/php85/usr/bin/php" ]; then PHP_BIN="/opt/alt/php85/usr/bin/php"
            elif [ -f "/opt/alt/php84/usr/bin/php" ]; then PHP_BIN="/opt/alt/php84/usr/bin/php"
            elif [ -f "/usr/local/bin/php" ]; then PHP_BIN="/usr/local/bin/php"
            else echo "php not found" >&2; exit 1; fi
            $PHP_BIN artisan down || true

      # Step 2: upload built frontend assets
      - name: Upload frontend assets
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "public/build/"
          target: ${{ secrets.DEPLOY_PATH }}/public/
          strip_components: 1

      # Step 3: install deps, migrate, cache, bring up
      # .env lives on the server permanently — never overwritten by CI
      - name: Run Laravel artisan commands
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            if command -v composer >/dev/null 2>&1; then COMPOSER_BIN="composer"
            elif [ -f "$HOME/bin/composer" ]; then COMPOSER_BIN="$HOME/bin/composer"
            elif [ -f "/usr/local/bin/composer" ]; then COMPOSER_BIN="/usr/local/bin/composer"
            else echo "composer not found" >&2; exit 1; fi
            $COMPOSER_BIN install --no-dev --optimize-autoloader --no-interaction --quiet
            if command -v php >/dev/null 2>&1; then PHP_BIN="php"
            elif [ -f "/opt/alt/php85/usr/bin/php" ]; then PHP_BIN="/opt/alt/php85/usr/bin/php"
            elif [ -f "/opt/alt/php84/usr/bin/php" ]; then PHP_BIN="/opt/alt/php84/usr/bin/php"
            elif [ -f "/usr/local/bin/php" ]; then PHP_BIN="/usr/local/bin/php"
            else echo "php not found" >&2; exit 1; fi
            echo "PHP: $($PHP_BIN -v | head -n1)"
            $PHP_BIN artisan migrate --force
            $PHP_BIN artisan optimize:clear
            $PHP_BIN artisan config:cache
            $PHP_BIN artisan route:cache
            $PHP_BIN artisan view:cache
            $PHP_BIN artisan event:cache
            $PHP_BIN artisan storage:link || true
            $PHP_BIN artisan optimize
            $PHP_BIN artisan up
            echo "Deploy complete: $(date)"

      # Step 4: keep public_html in sync (document root locked on shared hosting)
      - name: Sync public_html
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            DOCROOT="$HOME/public_html"
            APP="$HOME/fmplaylist"
            echo '<?php require "/home/fmplyomq/fmplaylist/public/index.php";' > "$DOCROOT/index.php"
            cp "$APP/public/.htaccess" "$DOCROOT/.htaccess"
            if [ ! -L "$DOCROOT/build" ]; then
              rm -rf "$DOCROOT/build"
              ln -s "$APP/public/build" "$DOCROOT/build"
            fi
            if [ ! -L "$DOCROOT/storage" ]; then
              rm -rf "$DOCROOT/storage"
              ln -s "$APP/storage/app/public" "$DOCROOT/storage"
            fi
            echo "public_html synced."
